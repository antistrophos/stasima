# SPDX-License-Identifier: Apache-2.0
# Publish to PyPI via Trusted Publishing (OIDC) — no API token exists anywhere.
# Trigger: publishing a GitHub Release (or the manual button). Chain: test -> build -> publish;
# only the publish job can mint the OIDC credential, and it only ever sees the built artifacts.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e .
      - run: python run_tests.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/stasima
    permissions:
      id-token: write   # the OIDC grant — this is the whole credential story
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
